spring.application.name=crowsnest
server.port=8080

watch.directory=src/main/resources

# At every 10 seconds
cron.expression = */10 * * * * *

ws.hostname.port=localhost:8080

awry.payload.feature.enabled=false
awry.payloads=offline, maintenance

email.feature.enabled=true
email.recipients = joel@example.net
email.sender.proxy = noreply.joel@example.net

#spring.mail.host=smtp.gmail.com
#spring.mail.port=587
#spring.mail.username=<login user to smtp server>
#spring.mail.password=<login password to smtp server>
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.host=localhost
spring.mail.port=25

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout.=5000
